name: stage2-devops-pipeline

on:
  push:
    branches: ["**"]
  pull_request:

env:
  REGISTRY: localhost:5000
  IMAGE_PREFIX: hng14-stage2-devops

jobs:

# ---------------- LINT ----------------
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: 3.11

      - name: Install flake8
        run: pip install flake8

      - name: Python lint
        run: flake8 api worker

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 18

      - name: JS lint
        run: |
          if [ -f frontend/package.json ]; then
            cd frontend
            npm install
            npx eslint . || true
          fi

# ---------------- TEST ----------------
  test:
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: 3.11

      - name: Install deps
        run: |
          pip install -r api/requirements.txt
          pip install pytest pytest-cov httpx

      - name: Run tests
        run: pytest api/tests -v --cov=api --cov-report=xml

      - name: Upload coverage
        uses: actions/upload-artifact@v4
        with:
          name: coverage
          path: coverage.xml

# ---------------- DOCKER LINT ----------------
  dockerlint:
    runs-on: ubuntu-latest
    needs: test
    steps:
      - uses: actions/checkout@v4

      - name: Install hadolint
        run: |
          wget -O hadolint https://github.com/hadolint/hadolint/releases/latest/download/hadolint-Linux-x86_64
          chmod +x hadolint
          sudo mv hadolint /usr/local/bin/

      - name: Lint Dockerfiles
        run: |
          hadolint api/Dockerfile
          hadolint worker/Dockerfile
          hadolint frontend/Dockerfile

# ---------------- BUILD ----------------
  build:
    runs-on: ubuntu-latest
    needs: dockerlint
    steps:
      - uses: actions/checkout@v4

      - name: Set tag
        run: echo "GIT_SHA=$(git rev-parse --short HEAD)" >> $GITHUB_ENV

      - name: Build images
        run: |
          docker build -t $REGISTRY/api:$GIT_SHA ./api
          docker build -t $REGISTRY/worker:$GIT_SHA ./worker
          docker build -t $REGISTRY/frontend:$GIT_SHA ./frontend

# ---------------- SECURITY ----------------
  security:
    runs-on: ubuntu-latest
    needs: build
    steps:
      - uses: actions/checkout@v4

      - name: Install Trivy
        run: |
          sudo apt-get update
          sudo apt-get install wget -y
          wget https://github.com/aquasecurity/trivy/releases/latest/download/trivy_0.48.0_Linux-64bit.deb
          sudo dpkg -i trivy_0.48.0_Linux-64bit.deb

      - name: Scan images
        run: |
          trivy image $REGISTRY/api:latest --severity CRITICAL --exit-code 1
          trivy image $REGISTRY/worker:latest --severity CRITICAL --exit-code 1
          trivy image $REGISTRY/frontend:latest --severity CRITICAL --exit-code 1

# ---------------- INTEGRATION ----------------
  integration:
    runs-on: ubuntu-latest
    needs: security
    steps:
      - uses: actions/checkout@v4

      - name: Start stack
        run: docker compose up -d --build

      - name: Wait for API
        run: |
          for i in {1..30}; do
            if curl -f http://localhost:8000/health; then
              exit 0
            fi
            sleep 5
          done
          exit 1

      - name: Tear down
        if: always()
        run: docker compose down

# ---------------- DEPLOY ----------------
  deploy:
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'
    needs: integration
    steps:
      - uses: actions/checkout@v4

      - name: Deploy
        run: bash deploy.sh
