version: "3.8"

services:

  redis:
    image: redis:7-alpine
    networks: [backend]
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  api:
    build: ./api
    env_file: .env
    ports:
      - "8000:8000"
    depends_on:
      redis:
        condition: service_healthy
    networks: [backend]
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 10s
      timeout: 5s
      retries: 5

  worker:
    build: ./worker
    env_file: .env
    depends_on:
      api:
        condition: service_healthy
    networks: [backend]

  frontend:
    build: ./frontend
    env_file: .env
    ports:
      - "8080:3000"
    networks: [backend]

networks:
  backend:
    driver: bridge
