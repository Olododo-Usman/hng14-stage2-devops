version: "3.8"

services:
  redis:
    image: redis:7-alpine
    networks:
      - backend
    restart: always
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  api:
    build: ./api
    env_file: .env
    ports:
      - "8000:8000"
    depends_on:
      redis:
        condition: service_healthy
    networks:
      - backend
    restart: always
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 10s
      timeout: 5s
      retries: 5
    deploy:
      resources:
        limits:
          cpus: "0.5"
          memory: "512M"

  worker:
    build: ./worker
    env_file: .env
    depends_on:
      api:
        condition: service_healthy
    networks:
      - backend
    restart: always
    deploy:
      resources:
        limits:
          cpus: "0.5"
          memory: "512M"

  frontend:
    build: ./frontend
    env_file: .env
    ports:
      - "3000:3000"
    depends_on:
      api:
        condition: service_started
    networks:
      - backend
    restart: always

networks:
  backend:
    driver: bridge
